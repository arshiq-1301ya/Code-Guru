<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My College ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">

        <div class="id-card">

            <header class="card-header">
                <img src="images/logo.png" class="logo" alt="College Logo">
                <p>Government Leather Institute Agra(282002)</p>
            </header>

            <div class="photo-wrap">
                <img src="images/photo.jpeg" alt="Profile Photo" class="photo">
            </div>

            <main class="card-body">

                <div class="name-section">
                    <h2 class="student-name">Arshiq</h2>
                    <p class="college">Government leather Institute Agra</p>
                </div>

                <hr class="divider">

                <div class="details">
                    <p><strong>Course:</strong> Diploma(CSE)</p>
                    <p><strong>DOB:</strong> 13-17-2007</p>
                </div>

                <div class="id-line">
                    <span class="id-label">ID No.:</span>
                    <span class="id-value">2026BC014</span>
                </div>

                <div class="barcode"></div>

            </main>

            <footer class="card-footer">
                <p class="footer-text">Issued by: Government Leather Institute Agra</p>
            </footer>

        </div>

    </div>

</body>
</html>
